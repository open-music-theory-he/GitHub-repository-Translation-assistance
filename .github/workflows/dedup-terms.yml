name: "3 - Remove duplicate English terms"

# Manual, one-time trigger (run it once from the Actions tab -> "Run workflow"),
# after data/translations.json is fully populated (completed: true).
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  dedupe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this (target/translation) repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run de-duplication
        run: python scripts/remove_duplicate_terms.py

      - name: Commit and push data/translations_deduped.json + data/dedup_log.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/translations_deduped.json data/dedup_log.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Remove duplicate English terms from translations"
            git push
          fi
