name: "4 - Push translations to source repo (via Pull Request)"

# Manual, one-time trigger (run it once from the Actions tab -> "Run workflow"),
# after script 3 has produced data/translations_deduped.json.
#
# This workflow NEVER pushes directly to the source repo's default branch.
# It commits the changes to a new branch and opens a Pull Request instead,
# so you can review every replacement before it goes live.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this (target/translation) repo
        uses: actions/checkout@v4

      - name: Checkout source repo (writable copy, via SOURCE_REPO_TOKEN)
        uses: actions/checkout@v4
        with:
          repository: open-music-theory-he/open-music-theory-he.github.io
          path: source-repo
          # Needs a Personal Access Token with write access (Contents +
          # Pull requests) to the SOURCE repo - see README for setup.
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply translations to source repo files (local disk only, no git yet)
        run: |
          python scripts/push_translations.py \
            --translations data/translations_deduped.json \
            --source ./source-repo

      - name: Open Pull Request on the source repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source-repo
          branch: hebrew-translation-import
          delete-branch: true
          commit-message: "Add Hebrew translations (automated)"
          title: "Hebrew translations (automated import)"
          body: |
            Automated Hebrew translation import, generated by the
            GitHub-repository-Translation-assistance pipeline.

            Please review the diff carefully before merging - in particular,
            check the workflow run's log for any "source text not found"
            warnings, which mean a sentence could NOT be placed automatically
            and that file may need a manual look.
