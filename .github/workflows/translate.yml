name: "2 - Translate sentences (Gemini)"

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours
  workflow_dispatch: {} # allow manual runs too, e.g. for testing

permissions:
  contents: write

concurrency:
  group: translate-sentences
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this (target/translation) repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run translation batch
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
          # Easiest way to change these: Settings -> Secrets and variables ->
          # Actions -> Variables tab -> add a repository variable with one of
          # these exact names. No code or workflow edit needed. If a variable
          # isn't set, the default after "||" is used.
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          SLEEP_BETWEEN_SECONDS: ${{ vars.SLEEP_BETWEEN_SECONDS || '4' }}
          TIME_BUDGET_SECONDS: ${{ vars.TIME_BUDGET_SECONDS || '1800' }}
          RETRY_DELAYS_SECONDS: ${{ vars.RETRY_DELAYS_SECONDS || '60,300' }}
        run: python scripts/translate_sentences.py

      - name: Commit and push data/translations.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/translations.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Translate batch of sentences"
            git push
          fi
